<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#00030a;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#00030a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <span style="font-size:42px;font-weight:900;letter-spacing:12px;color:#00ffee;">HEXA</span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:36px;">
              <span style="font-size:9px;letter-spacing:6px;color:rgba(0,255,238,0.4);font-family:monospace;">PLATFORM</span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#001a2e;border:2px solid #00ffee;border-radius:8px;padding:32px 28px;">

              <!-- Icon + Title -->
              <p style="margin:0 0 6px;text-align:center;font-size:32px;">🔑</p>
              <h1 style="margin:0 0 8px;text-align:center;font-size:18px;letter-spacing:4px;color:#00ffee;font-family:Arial Black,sans-serif;">PASSWORD RESET</h1>
              <p style="margin:0 0 24px;text-align:center;font-size:11px;letter-spacing:2px;color:#888888;font-family:monospace;">YOU REQUESTED A PASSWORD CHANGE</p>

              <!-- Divider -->
              <hr style="border:none;height:1px;background:#00ffee;margin:24px 0;opacity:0.3;">

              <!-- Body text -->
              <p style="margin:0 0 24px;font-size:13px;color:#cccccc;line-height:1.8;text-align:center;">
                Click the button below to set a new password for your HEXA account.<br><br>
                <strong>This link expires in 1 hour.</strong>
              </p>

              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:24px 0;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 36px;background:#00ffee;color:#000000;font-size:13px;font-weight:900;letter-spacing:3px;text-decoration:none;border-radius:4px;font-family:Arial Black,sans-serif;">SET NEW PASSWORD</a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <hr style="border:none;height:1px;background:#00ffee;margin:24px 0;opacity:0.2;">

              <!-- Warning -->
              <p style="margin:0;font-size:10px;color:#666666;text-align:center;line-height:1.8;font-family:monospace;letter-spacing:1px;">
                IF YOU DID NOT REQUEST THIS, IGNORE THIS EMAIL.<br>
                YOUR PASSWORD WILL NOT CHANGE.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:9px;letter-spacing:2px;color:#444444;font-family:monospace;">HEXA PLATFORM · AUTOMATED MESSAGE</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
