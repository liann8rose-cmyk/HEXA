<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEXA — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #00030a;
      --cyan: #00ffee;
      --purple: #cc44ff;
      --green: #00ff88;
      --red: #ff4466;
      --gold: #ffcc00;
      --panel: rgba(0, 6, 18, 0.97);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Barlow', sans-serif;
    }

    /* ── HEX GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(60deg, transparent, transparent 28px, rgba(0, 255, 136, 0.03) 28px, rgba(0, 255, 136, 0.03) 29px),
        repeating-linear-gradient(-60deg, transparent, transparent 28px, rgba(0, 255, 136, 0.03) 28px, rgba(0, 255, 136, 0.03) 29px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── WRAPPER ── */
    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── LOGO SECTION ── */
    .logo-section {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.7s ease both;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 10vw, 72px);
      letter-spacing: 0.3em;
      background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0, 255, 238, 0.4));
      margin-bottom: 8px;
      line-height: 1;
    }

    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: rgba(0, 255, 238, 0.5);
      text-transform: uppercase;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── MAIN CARD ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid rgba(0, 255, 238, 0.15);
      border-top: 2px solid var(--cyan);
      border-radius: 8px;
      padding: 36px 32px;
      box-shadow: 0 0 60px rgba(0, 255, 238, 0.06), 0 20px 60px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      animation: cardSlide 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardSlide {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── CARD HEADER ── */
    .card-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.2em;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0, 255, 238, 0.4);
      margin-bottom: 6px;
    }

    .card-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .card-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
    }

    /* ── FORM STATE ── */
    .form-state { display: none; }
    .form-state.active { display: block; }

    .field {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .pw-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .pw-wrap input {
      width: 100%;
      background: rgba(0, 5, 14, 0.9);
      border: 1px solid rgba(0, 255, 238, 0.15);
      border-radius: 4px;
      padding: 12px 40px 12px 14px;
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .pw-wrap input:focus {
      border-color: rgba(0, 255, 238, 0.5);
      box-shadow: 0 0 12px rgba(0, 255, 238, 0.15);
    }

    .pw-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .pw-eye {
      position: absolute;
      right: 12px;
      cursor: pointer;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.4);
      user-select: none;
      -webkit-user-select: none;
      transition: color 0.2s;
    }

    .pw-eye:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    /* ── STRENGTH METER ── */
    .strength-meter {
      margin-top: 8px;
    }

    .strength-bar {
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.4s, background 0.4s;
      background: transparent;
    }

    .strength-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 4px;
      transition: color 0.3s;
    }

    /* ── ERROR MESSAGE ── */
    .error-msg {
      display: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--red);
      background: rgba(255, 68, 102, 0.1);
      border: 1px solid rgba(255, 68, 102, 0.25);
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 16px;
      line-height: 1.6;
      animation: shakeIn 0.3s ease;
    }

    .error-msg.show {
      display: block;
    }

    @keyframes shakeIn {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      width: 100%;
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, var(--cyan), #0088cc);
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 28px rgba(0, 255, 238, 0.4);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── SUCCESS STATE ── */
    .success-state {
      display: none;
      text-align: center;
    }

    .success-state.active {
      display: block;
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .success-icon {
      font-size: 56px;
      margin-bottom: 16px;
      animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes bounceIn {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.2em;
      color: var(--green);
      text-shadow: 0 0 12px rgba(0, 255, 136, 0.4);
      margin-bottom: 10px;
    }

    .success-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .success-bar {
      height: 3px;
      background: rgba(0, 255, 136, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .success-fill {
      height: 100%;
      background: var(--green);
      width: 100%;
      box-shadow: 0 0 8px var(--green);
      transition: width 3s linear;
    }

    /* ── ERROR STATE (Token Expired) ── */
    .error-state {
      display: none;
      text-align: center;
    }

    .error-state.active {
      display: block;
      animation: fadeIn 0.5s ease both;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.2em;
      color: var(--red);
      margin-bottom: 10px;
    }

    .error-description {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .error-btn {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.15em;
      padding: 11px 28px;
      background: rgba(0, 255, 238, 0.08);
      border: 1px solid rgba(0, 255, 238, 0.3);
      color: var(--cyan);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .error-btn:hover {
      background: rgba(0, 255, 238, 0.15);
      box-shadow: 0 0 16px rgba(0, 255, 238, 0.25);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .card {
        padding: 28px 24px;
      }

      .logo {
        font-size: clamp(36px, 9vw, 60px);
      }

      .card-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- LOGO SECTION -->
  <div class="logo-section">
    <div class="logo">HEXA</div>
    <div class="logo-sub">Platform</div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- FORM STATE (Password Reset Form) -->
    <div id="formState" class="form-state active">
      <div class="card-header">
        <div class="card-icon">🔑</div>
        <div class="card-title">New Password</div>
        <div class="card-subtitle">Set Your New Password</div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <!-- Password Input -->
      <div class="field">
        <label class="field-label">New Password</label>
        <div class="pw-wrap">
          <input 
            type="password" 
            id="pw1" 
            placeholder="Enter new password"
            oninput="checkStrength()"
            onkeydown="if(event.key==='Enter') submit()"
          />
          <span class="pw-eye" onclick="toggleEye('pw1', this)">👁</span>
        </div>
        <div class="strength-meter">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>
      </div>

      <!-- Confirm Password Input -->
      <div class="field">
        <label class="field-label">Confirm Password</label>
        <div class="pw-wrap">
          <input 
            type="password" 
            id="pw2" 
            placeholder="Repeat password"
            onkeydown="if(event.key==='Enter') submit()"
          />
          <span class="pw-eye" onclick="toggleEye('pw2', this)">👁</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button class="submit-btn" id="submitBtn" onclick="submit()">Set New Password</button>
    </div>

    <!-- SUCCESS STATE -->
    <div id="successState" class="success-state">
      <div class="success-icon">✅</div>
      <div class="success-title">Password Updated</div>
      <div class="success-msg">
        Your password has been changed successfully.<br>
        Redirecting to login in 3 seconds...
      </div>
      <div class="success-bar">
        <div class="success-fill" id="successFill"></div>
      </div>
    </div>

    <!-- ERROR STATE (Token Expired) -->
    <div id="errorState" class="error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Link Expired</div>
      <div class="error-description">
        This password reset link has expired<br>or has already been used.<br>
        Please request a new one from the login page.
      </div>
      <a href="index.html" class="error-btn">← Back to Login</a>
    </div>

  </div>

</div>

<script>
  // Configuration
  const SB_URL = 'https://nfxyxnmatuzmqctttqnk.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5meHl4bm1hdHV6bXFjdHR0cW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1OTI5ODgsImV4cCI6MjA4NzE2ODk4OH0.86r1EeHHYEIpye1UuJnnxrlGpL9DixSfk-l5xId8pwg';

  let resetToken = null;

  // ── INITIALIZE: Extract token from URL ──
  (function init() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const type = params.get('type');
    const token = params.get('access_token');

    // Clean URL (remove hash) - safely handle sandbox environments
    try {
      if (window.history && window.history.replaceState) {
        history.replaceState(null, '', window.location.pathname);
      }
    } catch (e) {
      // Silently fail in sandbox/srcdoc environments (testing)
      console.log('URL cleanup skipped in sandbox environment');
    }

    if (type === 'recovery' && token) {
      resetToken = token;
      showForm();
    } else {
      showTokenError();
    }
  })();

  // ── SHOW/HIDE STATES ──
  function showForm() {
    document.getElementById('formState').classList.add('active');
    document.getElementById('successState').classList.remove('active');
    document.getElementById('errorState').classList.remove('active');
  }

  function showSuccess() {
    document.getElementById('formState').classList.remove('active');
    document.getElementById('successState').classList.add('active');
    document.getElementById('errorState').classList.remove('active');
  }

  function showTokenError() {
    document.getElementById('formState').classList.remove('active');
    document.getElementById('successState').classList.remove('active');
    document.getElementById('errorState').classList.add('active');
  }

  // ── TOGGLE PASSWORD VISIBILITY ──
  function toggleEye(inputId, eyeElement) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    eyeElement.textContent = isPassword ? '🙈' : '👁';
  }

  // ── CHECK PASSWORD STRENGTH ──
  function checkStrength() {
    const pw = document.getElementById('pw1').value;
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');

    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const widths = ['0%', '25%', '50%', '75%', '100%'];
    const colors = ['transparent', '#ff4466', '#ffcc00', '#00aaff', '#00ff88'];
    const labels = ['', 'WEAK', 'FAIR', 'GOOD', 'STRONG'];

    fill.style.width = widths[score];
    fill.style.background = colors[score];
    fill.style.boxShadow = score === 4 ? '0 0 8px #00ff88' : 'none';
    label.textContent = pw.length ? labels[score] : '';
    label.style.color = score === 0 ? 'rgba(255,255,255,.3)' : colors[score];
  }

  // ── SHOW ERROR MESSAGE ──
  function showError(message) {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = message;
    errorMsg.classList.add('show');
  }

  function clearError() {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('show');
    errorMsg.textContent = '';
  }

  // ── SUBMIT PASSWORD RESET ──
  async function submit() {
    clearError();

    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const btn = document.getElementById('submitBtn');

    // Validation
    if (!pw1) {
      showError('Please enter a new password.');
      return;
    }
    if (pw1.length < 6) {
      showError('Password must be at least 6 characters long.');
      return;
    }
    if (pw1 !== pw2) {
      showError('Passwords do not match.');
      return;
    }
    if (!resetToken) {
      showError('Reset token is missing. Please use the link from your email.');
      return;
    }

    // Disable button
    btn.disabled = true;
    btn.textContent = 'Updating...';

    try {
      const res = await fetch(`${SB_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SB_KEY,
          'Authorization': `Bearer ${resetToken}`
        },
        body: JSON.stringify({ password: pw1 })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        const msg = data.error?.message || 'Password update failed. Please try again.';
        showError(msg);
        btn.disabled = false;
        btn.textContent = 'Set New Password';
        return;
      }

      // Success! Get the email from the password input for login page
      resetToken = null;
      const emailForLogin = document.getElementById('pw1').value; // Get from form (we'll need to track the email differently)
      
      showSuccess();

      // Store reset success flag and email in sessionStorage
      sessionStorage.setItem('hexa_reset_success', 'true');
      
      // Animate success bar then redirect
      setTimeout(() => {
        document.getElementById('successFill').style.width = '0%';
      }, 100);

      setTimeout(() => {
        window.location.href = 'index.html?reset=success';
      }, 3000);

    } catch (error) {
      showError('Connection error. Please check your network and try again.');
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  }
</script>

</body>
</html>
