<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEXA — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #00030a;
  --cyan: #00ffee;
  --green: #00ff88;
  --purple: #cc44ff;
  --red: #ff4466;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: 'Barlow', sans-serif;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(60deg, transparent, transparent 28px, rgba(0,255,136,0.03) 28px, rgba(0,255,136,0.03) 29px),
    repeating-linear-gradient(-60deg, transparent, transparent 28px, rgba(0,255,136,0.03) 28px, rgba(0,255,136,0.03) 29px);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 0.35em;
  background: linear-gradient(90deg, var(--cyan), var(--purple), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 16px rgba(0,255,238,0.3));
  margin-bottom: 6px;
}

.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(0,255,238,0.4);
  text-align: center;
  margin-bottom: 40px;
}

.card {
  width: 100%;
  max-width: 360px;
  background: rgba(0,6,18,0.97);
  border: 1px solid rgba(0,255,238,0.15);
  border-top: 2px solid var(--cyan);
  border-radius: 8px;
  padding: 28px 24px;
  box-shadow: 0 0 60px rgba(0,255,238,0.06), 0 20px 60px rgba(0,0,0,0.8);
  animation: slideUp 0.4s ease both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.25em;
  color: var(--cyan);
  text-shadow: 0 0 10px rgba(0,255,238,0.4);
  margin-bottom: 4px;
  text-align: center;
}

.card p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.3);
  margin-bottom: 22px;
  text-align: center;
}

.field {
  margin-bottom: 14px;
}

.field label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.35);
  display: block;
  margin-bottom: 5px;
  text-transform: uppercase;
}

.password-wrap {
  position: relative;
}

.password-wrap input {
  width: 100%;
  background: rgba(0,5,14,0.9);
  border: 1px solid rgba(0,255,238,0.15);
  border-radius: 3px;
  color: #fff;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 11px 38px 11px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.password-wrap input:focus {
  border-color: rgba(0,255,238,0.5);
  box-shadow: 0 0 12px rgba(0,255,238,0.15);
}

.password-wrap input::placeholder {
  color: rgba(255,255,255,0.2);
}

.password-toggle {
  position: absolute;
  right: 11px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 15px;
  opacity: 0.45;
  transition: opacity 0.2s;
  user-select: none;
}

.password-toggle:hover {
  opacity: 0.9;
}

.strength-bar {
  height: 3px;
  border-radius: 2px;
  margin-top: 6px;
  background: rgba(255,255,255,0.07);
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  transition: width 0.35s, background-color 0.35s;
}

.strength-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.25);
  margin-top: 3px;
}

.error-message {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--red);
  background: rgba(255,68,102,0.07);
  border: 1px solid rgba(255,68,102,0.2);
  border-radius: 3px;
  padding: 7px 10px;
  margin-bottom: 12px;
  display: none;
}

.error-message.show {
  display: block;
}

.submit-button {
  width: 100%;
  padding: 13px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.2em;
  background: linear-gradient(90deg, var(--cyan), #0099bb);
  color: #000;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
  font-weight: 600;
}

.submit-button:hover:not(:disabled) {
  box-shadow: 0 0 20px rgba(0,255,238,0.35);
}

.submit-button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.success-state {
  display: none;
  text-align: center;
}

.success-state.show {
  display: block;
}

.success-icon {
  font-size: 48px;
  margin-bottom: 14px;
}

.success-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.25em;
  color: var(--green);
  text-shadow: 0 0 12px rgba(0,255,136,0.4);
  margin-bottom: 8px;
}

.success-message {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
  line-height: 1.9;
  margin-bottom: 18px;
}

.progress-bar {
  height: 3px;
  background: rgba(0,255,136,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--green);
  width: 100%;
  box-shadow: 0 0 8px var(--green);
  transition: width 3s linear;
}

.error-state {
  display: none;
  text-align: center;
}

.error-state.show {
  display: block;
}

.error-icon {
  font-size: 40px;
  margin-bottom: 12px;
}

.error-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.2em;
  color: var(--red);
  margin-bottom: 8px;
}

.error-description {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.07em;
  line-height: 1.9;
  margin-bottom: 16px;
}

.back-button {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  padding: 9px 22px;
  background: rgba(0,255,238,0.06);
  border: 1px solid rgba(0,255,238,0.25);
  color: var(--cyan);
  border-radius: 3px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}

.back-button:hover {
  background: rgba(0,255,238,0.12);
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">HEXA</div>
  <div class="logo-sub">PLATFORM</div>

  <div class="card">
    <!-- Form State -->
    <div id="formState">
      <h2>🔑 NEW PASSWORD</h2>
      <p>ENTER YOUR NEW PASSWORD BELOW</p>

      <div class="field">
        <label>New Password</label>
        <div class="password-wrap">
          <input type="password" id="password1" placeholder="New password" oninput="checkStrength()" onkeydown="if(event.key==='Enter') submitForm()">
          <span class="password-toggle" onclick="togglePassword('password1', this)">👁</span>
        </div>
        <div class="strength-bar">
          <div class="strength-fill" id="strengthBar"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="password2" placeholder="Repeat password" onkeydown="if(event.key==='Enter') submitForm()">
          <span class="password-toggle" onclick="togglePassword('password2', this)">👁</span>
        </div>
      </div>

      <div class="error-message" id="errorMsg"></div>
      <button class="submit-button" id="submitBtn" onclick="submitForm()">SET NEW PASSWORD</button>
    </div>

    <!-- Success State -->
    <div id="successState" class="success-state">
      <div class="success-icon">✅</div>
      <div class="success-title">PASSWORD UPDATED</div>
      <div class="success-message">Your password has been changed.<br>Redirecting to login in 3 seconds...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-title">LINK EXPIRED</div>
      <div class="error-description">This password reset link has expired<br>or has already been used.<br>Request a new one from the login page.</div>
      <a href="index.html" class="back-button">← BACK TO LOGIN</a>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://nfxyxnmatuzmqctttqnk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5meHl4bm1hdHV6bXFjdHR0cW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1OTI5ODgsImV4cCI6MjA4NzE2ODk4OH0.86r1EeHHYEIpye1UuJnnxrlGpL9DixSfk-l5xId8pwg';

let resetToken = null;

function initPage() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const type = params.get('type');
  const token = params.get('access_token');

  try {
    history.replaceState(null, '', window.location.pathname);
  } catch (e) {}

  if (type === 'recovery' && token) {
    resetToken = token;
  } else {
    // Use a dummy token for testing/UI purposes
    resetToken = 'test_token_' + Date.now();
  }
  
  showFormState();
}

function showFormState() {
  document.getElementById('formState').style.display = 'block';
  document.getElementById('successState').classList.remove('show');
  document.getElementById('errorState').classList.remove('show');
}

function showSuccessState() {
  document.getElementById('formState').style.display = 'none';
  document.getElementById('successState').classList.add('show');
  document.getElementById('errorState').classList.remove('show');
}

function showErrorState() {
  document.getElementById('formState').style.display = 'none';
  document.getElementById('successState').classList.remove('show');
  document.getElementById('errorState').classList.add('show');
}

function togglePassword(inputId, toggle) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    toggle.textContent = '🙈';
  } else {
    input.type = 'password';
    toggle.textContent = '👁';
  }
}

function checkStrength() {
  const pw = document.getElementById('password1').value;
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');

  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const widths = ['0%', '25%', '50%', '75%', '100%'];
  const colors = ['transparent', '#ff4466', '#ffcc00', '#00aaff', '#00ff88'];
  const labels = ['', 'WEAK', 'FAIR', 'GOOD', 'STRONG'];

  bar.style.width = widths[score];
  bar.style.backgroundColor = colors[score];
  text.textContent = pw.length ? labels[score] : '';
  text.style.color = colors[score] || 'rgba(255,255,255,0.25)';
}

function showError(message) {
  const msg = document.getElementById('errorMsg');
  msg.textContent = message;
  msg.classList.add('show');
}

function hideError() {
  const msg = document.getElementById('errorMsg');
  msg.classList.remove('show');
}

async function submitForm() {
  hideError();

  const pw1 = document.getElementById('password1').value;
  const pw2 = document.getElementById('password2').value;
  const btn = document.getElementById('submitBtn');

  if (!pw1) {
    showError('Enter a new password.');
    return;
  }

  if (pw1.length < 6) {
    showError('Password must be at least 6 characters.');
    return;
  }

  if (pw1 !== pw2) {
    showError('Passwords do not match.');
    return;
  }

  if (!resetToken) {
    showError('Reset token missing. Use the link from your email.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'UPDATING...';

  try {
    const response = await fetch(SB_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + resetToken
      },
      body: JSON.stringify({ password: pw1 })
    });

    const data = await response.json();

    if (!response.ok || data.error) {
      const errorMsg = data.error?.message || 'Password update failed. Try again.';
      showError(errorMsg);
      btn.disabled = false;
      btn.textContent = 'SET NEW PASSWORD';
      return;
    }

    resetToken = null;
    sessionStorage.setItem('hexa_reset_success', 'true');
    showSuccessState();

    setTimeout(() => {
      document.getElementById('progressBar').style.width = '0%';
    }, 50);

    setTimeout(() => {
      window.location.href = 'index.html?reset=success';
    }, 3000);

  } catch (error) {
    showError('Connection error. Check your network.');
    btn.disabled = false;
    btn.textContent = 'SET NEW PASSWORD';
  }
}

initPage();
</script>

</body>
</html>
