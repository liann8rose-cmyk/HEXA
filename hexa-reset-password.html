<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEXA — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #00030a;
  --cyan: #00ffee;
  --green: #00ff88;
  --purple: #cc44ff;
  --red: #ff4466;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: 'Barlow', sans-serif;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(60deg, transparent, transparent 28px, rgba(0,255,136,0.03) 28px, rgba(0,255,136,0.03) 29px),
    repeating-linear-gradient(-60deg, transparent, transparent 28px, rgba(0,255,136,0.03) 28px, rgba(0,255,136,0.03) 29px);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 0.35em;
  background: linear-gradient(90deg, var(--cyan), var(--purple), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 16px rgba(0,255,238,0.3));
  margin-bottom: 6px;
}

.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(0,255,238,0.4);
  text-align: center;
  margin-bottom: 40px;
}

.card {
  width: 100%;
  max-width: 360px;
  background: rgba(0,6,18,0.97);
  border: 1px solid rgba(0,255,238,0.15);
  border-top: 2px solid var(--cyan);
  border-radius: 8px;
  padding: 40px 28px;
  box-shadow: 0 0 60px rgba(0,255,238,0.06), 0 20px 60px rgba(0,0,0,0.8);
  animation: slideUp 0.4s ease both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-title {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 6px;
}

.card h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.15em;
  color: var(--cyan);
  text-shadow: 0 0 10px rgba(0,255,238,0.4);
  text-align: center;
  margin: 0;
}

.card-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.3);
  margin-bottom: 24px;
  text-align: center;
}

.field {
  margin-bottom: 16px;
}

.field label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.35);
  display: block;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.input-wrap {
  position: relative;
}

.input-wrap input {
  width: 100%;
  background: rgba(0,5,14,0.9);
  border: 1px solid rgba(0,255,238,0.15);
  border-radius: 3px;
  color: #fff;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 12px 38px 12px 14px;
  outline: none;
  transition: border-color 0.2s;
}

.input-wrap input:focus {
  border-color: rgba(0,255,238,0.5);
  box-shadow: 0 0 12px rgba(0,255,238,0.15);
}

.input-wrap input::placeholder {
  color: rgba(255,255,255,0.25);
}

.toggle-icon {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 16px;
  opacity: 0.5;
  transition: opacity 0.2s;
  user-select: none;
}

.toggle-icon:hover {
  opacity: 0.8;
}

.password-wrap {
  position: relative;
}

.password-wrap input {
  width: 100%;
  background: rgba(0,5,14,0.9);
  border: 1px solid rgba(0,255,238,0.15);
  border-radius: 3px;
  color: #fff;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 12px 38px 12px 14px;
  outline: none;
  transition: border-color 0.2s;
}

.password-wrap input:focus {
  border-color: rgba(0,255,238,0.5);
  box-shadow: 0 0 12px rgba(0,255,238,0.15);
}

.password-wrap input::placeholder {
  color: rgba(255,255,255,0.25);
}

.strength-bar {
  height: 3px;
  border-radius: 2px;
  margin-top: 6px;
  background: rgba(255,255,255,0.07);
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  transition: width 0.35s, background-color 0.35s;
}

.strength-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 7px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.25);
  margin-top: 2px;
}

.error-message {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--red);
  background: rgba(255,68,102,0.07);
  border: 1px solid rgba(255,68,102,0.2);
  border-radius: 3px;
  padding: 8px 10px;
  margin-bottom: 14px;
  display: none;
}

.error-message.show {
  display: block;
}

.button {
  width: 100%;
  padding: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.18em;
  background: var(--cyan);
  color: #000;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
  font-weight: 600;
}

.button:hover:not(:disabled) {
  box-shadow: 0 0 20px rgba(0,255,238,0.4);
  background: #00ffe0;
}

.button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.back-link {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  color: var(--cyan);
  cursor: pointer;
  margin-top: 12px;
  transition: all 0.2s;
  text-decoration: none;
}

.back-link:hover {
  opacity: 0.7;
}

.verify-state,
.password-state,
.success-state {
  display: none;
}

.verify-state.show,
.password-state.show,
.success-state.show {
  display: block;
}

.success-icon {
  font-size: 48px;
  margin-bottom: 14px;
}

.success-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.25em;
  color: var(--green);
  text-shadow: 0 0 12px rgba(0,255,136,0.4);
  margin-bottom: 8px;
}

.success-message {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
  line-height: 1.9;
  margin-bottom: 18px;
}

.progress-bar {
  height: 3px;
  background: rgba(0,255,136,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--green);
  width: 100%;
  box-shadow: 0 0 8px var(--green);
  transition: width 3s linear;
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">HEXA</div>
  <div class="logo-sub">PLATFORM</div>

  <div class="card">

    <!-- VERIFICATION STATE (Email + Current Password) -->
    <div class="verify-state show">
      <div class="card-title">
        <span style="font-size: 20px;">🔑</span>
        <h2>RESET PASSWORD</h2>
      </div>
      <p class="card-subtitle">VERIFY YOUR ACCOUNT</p>

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" id="verifyEmail" placeholder="your@email.com">
        </div>
      </div>

      <div class="field">
        <label>Current Password</label>
        <div class="input-wrap">
          <input type="password" id="currentPassword" placeholder="Current password">
          <span class="toggle-icon" onclick="togglePasswordVisibility('currentPassword', this)">👁</span>
        </div>
      </div>

      <div class="error-message" id="verifyError"></div>
      <button class="button" id="verifyBtn" onclick="verifyAccount()">CONTINUE</button>
      <a href="index.html" class="back-link">← BACK TO LOGIN</a>
    </div>

    <!-- PASSWORD RESET STATE -->
    <div class="password-state">
      <div class="card-title">
        <span style="font-size: 20px;">🔑</span>
        <h2>NEW PASSWORD</h2>
      </div>
      <p class="card-subtitle">ENTER YOUR NEW PASSWORD BELOW</p>

      <div class="field">
        <label>New Password</label>
        <div class="password-wrap">
          <input type="password" id="password1" placeholder="New password" oninput="checkStrength()" onkeydown="if(event.key==='Enter') submitForm()">
          <span class="toggle-icon" onclick="togglePasswordVisibility('password1', this)">👁</span>
        </div>
        <div class="strength-bar">
          <div class="strength-fill" id="strengthBar"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="password2" placeholder="Repeat password" onkeydown="if(event.key==='Enter') submitForm()">
          <span class="toggle-icon" onclick="togglePasswordVisibility('password2', this)">👁</span>
        </div>
      </div>

      <div class="error-message" id="passwordError"></div>
      <button class="button" id="submitBtn" onclick="submitForm()">SET NEW PASSWORD</button>
      <a class="back-link" onclick="resetFlow()">← BACK</a>
    </div>

    <!-- SUCCESS STATE -->
    <div class="success-state">
      <div class="success-icon">✅</div>
      <div class="success-title">PASSWORD UPDATED</div>
      <div class="success-message">Your password has been changed.<br>Redirecting to login in 3 seconds...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://nfxyxnmatuzmqctttqnk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5meHl4bm1hdHV6bXFjdHR0cW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1OTI5ODgsImV4cCI6MjA4NzE2ODk4OH0.86r1EeHHYEIpye1UuJnnxrlGpL9DixSfk-l5xId8pwg';

const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

let verifiedEmail = null;

function showVerifyState() {
  document.querySelector('.verify-state').classList.add('show');
  document.querySelector('.password-state').classList.remove('show');
  document.querySelector('.success-state').classList.remove('show');
}

function showPasswordState() {
  document.querySelector('.verify-state').classList.remove('show');
  document.querySelector('.password-state').classList.add('show');
  document.querySelector('.success-state').classList.remove('show');
}

function showSuccessState() {
  document.querySelector('.verify-state').classList.remove('show');
  document.querySelector('.password-state').classList.remove('show');
  document.querySelector('.success-state').classList.add('show');
}

function resetFlow() {
  verifiedEmail = null;
  document.getElementById('verifyEmail').value = '';
  document.getElementById('currentPassword').value = '';
  document.getElementById('password1').value = '';
  document.getElementById('password2').value = '';
  hideError('verifyError');
  hideError('passwordError');
  showVerifyState();
}

function showError(elementId, msg) {
  const el = document.getElementById(elementId);
  el.textContent = msg;
  el.classList.add('show');
}

function hideError(elementId) {
  document.getElementById(elementId).classList.remove('show');
}

function togglePasswordVisibility(inputId, toggle) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    toggle.textContent = '🙈';
  } else {
    input.type = 'password';
    toggle.textContent = '👁';
  }
}

async function verifyAccount() {
  hideError('verifyError');
  const email = document.getElementById('verifyEmail').value.trim();
  const password = document.getElementById('currentPassword').value;
  const btn = document.getElementById('verifyBtn');

  if (!email) {
    showError('verifyError', 'Please enter your email address.');
    return;
  }

  if (!email.includes('@')) {
    showError('verifyError', 'Please enter a valid email address.');
    return;
  }

  if (!password) {
    showError('verifyError', 'Please enter your current password.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'VERIFYING...';

  try {
    // Verify credentials by signing in
    const { data, error } = await sbClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      showError('verifyError', 'Invalid email or password.');
      btn.disabled = false;
      btn.textContent = 'CONTINUE';
      return;
    }

    if (data.user) {
      verifiedEmail = email;
      // Sign out immediately - user will sign in after password reset
      await sbClient.auth.signOut();
      btn.textContent = 'CONTINUE';
      btn.disabled = false;
      showPasswordState();
    }

  } catch (err) {
    showError('verifyError', 'Error verifying account. Try again.');
    btn.disabled = false;
    btn.textContent = 'CONTINUE';
  }
}

function checkStrength() {
  const pw = document.getElementById('password1').value;
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const widths = ['0%', '25%', '50%', '75%', '100%'];
  const colors = ['transparent', '#ff4466', '#ffcc00', '#00aaff', '#00ff88'];
  const labels = ['', 'WEAK', 'FAIR', 'GOOD', 'STRONG'];
  bar.style.width = widths[score];
  bar.style.backgroundColor = colors[score];
  text.textContent = pw.length ? labels[score] : '';
  text.style.color = colors[score] || 'rgba(255,255,255,0.25)';
}

async function submitForm() {
  hideError('passwordError');
  const pw1 = document.getElementById('password1').value;
  const pw2 = document.getElementById('password2').value;
  const btn = document.getElementById('submitBtn');

  if (!pw1) { showError('passwordError', 'Enter a new password.'); return; }
  if (pw1.length < 6) { showError('passwordError', 'Password must be at least 6 characters.'); return; }
  if (pw1 !== pw2) { showError('passwordError', 'Passwords do not match.'); return; }

  btn.disabled = true;
  btn.textContent = 'UPDATING...';

  try {
    // Sign in again to get a valid session for password update
    const currentPw = document.getElementById('currentPassword').value;
    const { data: signInData, error: signInError } = await sbClient.auth.signInWithPassword({
      email: verifiedEmail,
      password: currentPw
    });

    if (signInError) {
      showError('passwordError', 'Session expired. Please verify again.');
      btn.disabled = false;
      btn.textContent = 'SET NEW PASSWORD';
      resetFlow();
      return;
    }

    // Now update password
    const { error: updateError } = await sbClient.auth.updateUser({
      password: pw1
    });

    if (updateError) {
      showError('passwordError', updateError.message || 'Password update failed.');
      btn.disabled = false;
      btn.textContent = 'SET NEW PASSWORD';
      return;
    }

    // Success!
    await sbClient.auth.signOut();
    showSuccessState();

    setTimeout(() => {
      document.getElementById('progressBar').style.width = '0%';
    }, 50);

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 3000);

  } catch (err) {
    showError('passwordError', 'Error updating password.');
    btn.disabled = false;
    btn.textContent = 'SET NEW PASSWORD';
  }
}

showVerifyState();
</script>

</body>
</html>
