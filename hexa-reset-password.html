<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEXA — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#00030a;
  --cyan:#00ffee;
  --grn:#00ff88;
  --pur:#cc44ff;
  --red:#ff4466;
  --gold:#ffcc00;
}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Barlow',sans-serif;}

/* hex grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(60deg,transparent,transparent 28px,rgba(0,255,136,.03) 28px,rgba(0,255,136,.03) 29px),
    repeating-linear-gradient(-60deg,transparent,transparent 28px,rgba(0,255,136,.03) 28px,rgba(0,255,136,.03) 29px);
  pointer-events:none;z-index:0;
}

.wrap{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px;
}

/* logo */
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:.35em;
  background:linear-gradient(90deg,var(--cyan),var(--pur),var(--grn));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px rgba(0,255,238,.3));
  margin-bottom:6px;
}
.logo-sub{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.35em;
  color:rgba(0,255,238,.4);text-align:center;margin-bottom:36px;
}

/* card */
.card{
  width:min(360px,92vw);
  background:rgba(0,6,18,.97);
  border:1px solid rgba(0,255,238,.15);
  border-top:2px solid var(--cyan);
  border-radius:8px;
  padding:28px 24px;
  box-shadow:0 0 60px rgba(0,255,238,.06),0 20px 60px rgba(0,0,0,.8);
  animation:cardIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-title{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.25em;
  color:var(--cyan);text-shadow:0 0 10px rgba(0,255,238,.4);
  margin-bottom:4px;
}
.card-sub{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.12em;
  color:rgba(255,255,255,.3);margin-bottom:22px;
}

/* field */
.field{margin-bottom:14px;}
.field label{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.18em;
  color:rgba(255,255,255,.35);display:block;margin-bottom:5px;
}
.pw-wrap{position:relative;}
.pw-wrap input{
  width:100%;background:rgba(0,5,14,.9);
  border:1px solid rgba(0,255,238,.15);border-radius:3px;
  color:#fff;font-family:'Barlow',sans-serif;font-size:14px;
  padding:11px 38px 11px 12px;outline:none;transition:border-color .2s;
}
.pw-wrap input:focus{border-color:rgba(0,255,238,.5);box-shadow:0 0 0 2px rgba(0,255,238,.06);}
.pw-wrap input::placeholder{color:rgba(255,255,255,.2);}
.pw-eye{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  cursor:pointer;font-size:15px;opacity:.45;transition:opacity .2s;user-select:none;
}
.pw-eye:hover{opacity:.9;}

/* strength */
.strength-bar{height:3px;border-radius:2px;margin-top:6px;background:rgba(255,255,255,.07);overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;width:0%;transition:width .35s,background .35s;}
.strength-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.25);margin-top:3px;transition:color .3s;}

/* error */
.err{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.06em;
  color:var(--red);margin-bottom:12px;display:none;
  padding:7px 10px;background:rgba(255,68,102,.07);
  border:1px solid rgba(255,68,102,.2);border-radius:3px;
}

/* submit btn */
.submit-btn{
  width:100%;padding:13px;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.2em;
  background:linear-gradient(90deg,var(--cyan),#0099bb);
  color:#000;border:none;border-radius:3px;cursor:pointer;
  transition:all .2s;margin-top:4px;
}
.submit-btn:hover{box-shadow:0 0 20px rgba(0,255,238,.35);}
.submit-btn:disabled{opacity:.3;cursor:default;pointer-events:none;}

/* success state */
#success-state{display:none;text-align:center;padding:10px 0;}
.s-icon{font-size:48px;margin-bottom:14px;}
.s-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.25em;color:var(--grn);text-shadow:0 0 12px rgba(0,255,136,.4);margin-bottom:8px;}
.s-msg{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;line-height:1.9;}
.s-bar{height:3px;background:rgba(0,255,136,.12);border-radius:2px;overflow:hidden;margin-top:18px;}
.s-bar-fill{height:100%;background:var(--grn);width:100%;transition:width 3s linear;box-shadow:0 0 8px var(--grn);}

/* error state (bad/expired token) */
#error-state{display:none;text-align:center;padding:10px 0;}
.e-icon{font-size:40px;margin-bottom:12px;}
.e-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.2em;color:var(--red);margin-bottom:8px;}
.e-msg{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.07em;line-height:1.9;margin-bottom:16px;}
.e-btn{
  display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.15em;
  padding:9px 22px;background:rgba(0,255,238,.06);border:1px solid rgba(0,255,238,.25);
  color:var(--cyan);border-radius:3px;cursor:pointer;text-decoration:none;transition:all .2s;
}
.e-btn:hover{background:rgba(0,255,238,.12);}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">HEXA</div>
  <div class="logo-sub">PLATFORM</div>

  <div class="card">

    <!-- FORM STATE -->
    <div id="form-state">
      <div class="card-title">🔑 NEW PASSWORD</div>
      <div class="card-sub">ENTER YOUR NEW PASSWORD BELOW</div>

      <div class="field">
        <label>NEW PASSWORD</label>
        <div class="pw-wrap">
          <input type="password" id="pw1" placeholder="New password"
            oninput="checkStrength()" onkeydown="if(event.key==='Enter')submit()"/>
          <span class="pw-eye" onclick="toggleEye('pw1',this)">👁</span>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="s-fill"></div></div>
        <div class="strength-lbl" id="s-lbl"></div>
      </div>

      <div class="field">
        <label>CONFIRM PASSWORD</label>
        <div class="pw-wrap">
          <input type="password" id="pw2" placeholder="Repeat password"
            onkeydown="if(event.key==='Enter')submit()"/>
          <span class="pw-eye" onclick="toggleEye('pw2',this)">👁</span>
        </div>
      </div>

      <div class="err" id="err"></div>
      <button class="submit-btn" id="submit-btn" onclick="submit()">SET NEW PASSWORD</button>
    </div>

    <!-- SUCCESS STATE -->
    <div id="success-state">
      <div class="s-icon">✅</div>
      <div class="s-title">PASSWORD UPDATED</div>
      <div class="s-msg">Your password has been changed.<br>Redirecting to login in 3 seconds...</div>
      <div class="s-bar"><div class="s-bar-fill" id="s-bar-fill"></div></div>
    </div>

    <!-- ERROR STATE (expired/missing token) -->
    <div id="error-state">
      <div class="e-icon">⚠️</div>
      <div class="e-title">LINK EXPIRED</div>
      <div class="e-msg">
        This password reset link has expired<br>
        or has already been used.<br>
        Request a new one from the login page.
      </div>
      <a class="e-btn" href="https://liann8rose-cmyk.github.io/HEXA/index.html">← BACK TO LOGIN</a>
    </div>

  </div>
</div>

<script>
const SB_URL = 'https://nfxyxnmatuzmqctttqnk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5meHl4bm1hdHV6bXFjdHR0cW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1OTI5ODgsImV4cCI6MjA4NzE2ODk4OH0.86r1EeHHYEIpye1UuJnnxrlGpL9DixSfk-l5xId8pwg';

let _token = null;

// ── DETECT TOKEN FROM URL HASH ──────────────────────────────────
(function init() {
  const hash   = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const type   = params.get('type');
  const token  = params.get('access_token');

  // Clean URL
  history.replaceState(null, '', window.location.pathname);

  if (type === 'recovery' && token) {
    _token = token;
    // Show form
    document.getElementById('form-state').style.display = '';
  } else {
    // No valid token — show error state
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('error-state').style.display = '';
  }
})();

function toggleEye(id, span) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  span.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function checkStrength() {
  const pw   = document.getElementById('pw1').value;
  const fill = document.getElementById('s-fill');
  const lbl  = document.getElementById('s-lbl');
  let score  = 0;
  if (pw.length >= 8)          score++;
  if (/[A-Z]/.test(pw))        score++;
  if (/[0-9]/.test(pw))        score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct    = ['0%','25%','50%','75%','100%'];
  const colors = ['','#ff4466','#ffcc00','#00aaff','#00ff88'];
  const labels = ['','WEAK','FAIR','GOOD','STRONG'];
  fill.style.width      = pct[score];
  fill.style.background = colors[score] || '';
  fill.style.boxShadow  = score === 4 ? '0 0 8px #00ff88' : 'none';
  lbl.textContent  = pw.length ? labels[score] : '';
  lbl.style.color  = colors[score] || 'rgba(255,255,255,.25)';
}

async function submit() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('submit-btn');

  err.style.display = 'none';

  if (!pw1)          { showErr('Enter a new password.'); return; }
  if (pw1.length < 6){ showErr('Password must be at least 6 characters.'); return; }
  if (pw1 !== pw2)   { showErr('Passwords do not match.'); return; }
  if (!_token)       { showErr('Reset token missing — use the link from your email.'); return; }

  btn.disabled     = true;
  btn.textContent  = 'UPDATING...';

  try {
    const res = await fetch(SB_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SB_KEY,
        'Authorization': 'Bearer ' + _token
      },
      body: JSON.stringify({ password: pw1 })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      const msg = data.error?.message || data.msg || 'Update failed — try again.';
      showErr(msg);
      btn.disabled    = false;
      btn.textContent = 'SET NEW PASSWORD';
      return;
    }

    // ── SUCCESS ──
    _token = null;
    document.getElementById('form-state').style.display    = 'none';
    document.getElementById('success-state').style.display = '';

    // Animate progress bar then redirect
    setTimeout(() => {
      document.getElementById('s-bar-fill').style.width = '0%';
    }, 50);
    setTimeout(() => {
      window.location.href = 'https://liann8rose-cmyk.github.io/HEXA/index.html';
    }, 3000);

  } catch(e) {
    showErr('Connection error — check your network and try again.');
    btn.disabled    = false;
    btn.textContent = 'SET NEW PASSWORD';
  }
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent   = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
